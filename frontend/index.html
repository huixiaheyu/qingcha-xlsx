<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>清查表生成工具</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-4xl px-4 py-10">
    <section class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
      <p class="text-sm font-semibold text-blue-600">固定模板 · 上传源表 · 下载结果</p>
      <h1 class="mt-2 text-3xl font-bold tracking-tight">清查表生成工具</h1>
      <p class="mt-3 text-slate-600">系统使用服务端固定模板，只需上传 7 张源表。文件名允许以指定名称开头，例如带日期后缀也可识别。</p>

      <div class="mt-6 rounded-2xl bg-slate-50 p-4 ring-1 ring-slate-200">
        <h2 class="font-semibold">必需源表</h2>
        <ul id="requiredFiles" class="mt-3 grid gap-2 text-sm text-slate-700 sm:grid-cols-2"></ul>
      </div>

      <div class="mt-6 grid gap-4 sm:grid-cols-[1fr_1.2fr]">
        <label class="block">
          <span class="text-sm font-medium text-slate-700">最终文件名</span>
          <input id="outputFilename" type="text" value="清查表（已填充）.xlsx" placeholder="xxx-清查表（已填充）.xlsx" class="mt-2 block w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-700">源表文件</span>
          <input id="fileInput" type="file" multiple accept=".xlsx" class="mt-2 block w-full rounded-xl border border-dashed border-slate-300 bg-white p-3 text-sm file:mr-4 file:rounded-lg file:border-0 file:bg-blue-50 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-blue-700 hover:file:bg-blue-100">
        </label>
      </div>
      <div class="mt-4 flex flex-wrap gap-3">
        <button id="buildButton" class="rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 disabled:bg-slate-400">生成清查表</button>
        <a id="downloadButton" class="pointer-events-none rounded-xl bg-slate-300 px-5 py-3 text-sm font-semibold text-white" href="#" aria-disabled="true">下载生成文件</a>
      </div>
    </section>

    <section class="mt-6 rounded-3xl bg-slate-950 p-5 shadow-sm">
      <div class="flex items-center justify-between">
        <h2 class="font-semibold text-white">日志</h2>
        <span class="text-xs text-slate-400">缺失、忽略、生成结果都会显示在这里</span>
      </div>
      <pre id="logs" class="mt-4 max-h-96 overflow-auto whitespace-pre-wrap text-sm leading-7 text-emerald-100">等待上传文件...</pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
