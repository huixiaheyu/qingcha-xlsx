services:
  qingcha-web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "18090:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
